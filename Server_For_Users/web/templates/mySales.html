{% extends 'base.html' %}

{% block title %}
My Sales
{% endblock %}

{% block content %}

<script src="js/mySales.js"></script>
<script type="text/javascript">
    checkConnection()
</script>

<div class="min-h-[78vh] space-y-12">
    <!-- Properties Available To Sell -->
    <div id="salesTable">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-white flex items-center gap-4">
                Your Listed Properties
                <button onclick="refreshMySales()"
                    class="p-2 bg-white/5 hover:bg-white/10 rounded-lg transition-all text-secondary hover:text-white"
                    title="Refresh Sales">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </h2>
        </div>

        <div class="glass rounded-2xl overflow-hidden shadow-2xl border border-white/10">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5 border-b border-white/10">
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">S.No
                            </th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Sale Id
                            </th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Property
                                Id</th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Price
                                (ETH)</th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Accepted
                                For</th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">State
                            </th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Requests
                            </th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody id="salesTableBody" class="divide-y divide-white/5">
                        <!-- Content populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Requested Users for a Sale -->
    <div id="requestedUsersOfaSale" class="hidden">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <h2 class="text-2xl font-bold text-white">Purchase Requests for Property ID: <span id="propertyId"
                    class="text-primary font-mono tracking-tight"></span></h2>
            <button onclick="toggleSalesAndRequestedUsersTables()" id="backToSalesTableButton"
                class="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 text-white rounded-xl border border-white/10 transition-all text-sm font-semibold w-fit">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Sales
            </button>
        </div>

        <div class="glass rounded-2xl overflow-hidden shadow-2xl border border-white/10">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5 border-b border-white/10">
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">S.No
                            </th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">
                                Requested User</th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Price
                                Offered (ETH)</th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody id="requestedUsersOfaSaleTableBody" class="divide-y divide-white/5">
                        <!-- Content populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

{% endblock %}
