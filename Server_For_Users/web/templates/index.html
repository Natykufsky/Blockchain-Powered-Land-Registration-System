{% extends 'base.html' %}

{% block title %}Connect Wallet{% endblock %}

{% block content %}
<script src="js/index.js"></script>

<div class="flex-1 flex justify-center items-center py-5 px-4 w-full min-h-[70vh]">
  <div
    class="glass p-12 rounded-[2.5rem] w-full max-w-[500px] text-center shadow-2xl border border-white/20 animate-fade-in-up">
    <div id="connectToBlockchainDiv" class="flex flex-col items-center">
      <div
        class="bg-gradient-to-br from-primary to-secondary w-20 h-20 rounded-2xl flex items-center justify-center mb-8 text-white shadow-xl shadow-primary/30">
        <svg xmlns=http://www.w3.org/2000/svg width="48" height="48" fill="currentColor" class="bi bi-wallet2"
          viewBox="0 0 16 16">
          <path
            d="M12.136.326A1.5 1.5 0 0 1 14 1.78V3h.5A1.5 1.5 0 0 1 16 4.5v9a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 13.5v-9a1.5 1.5 0 0 1 1.432-1.499L12.136.326zM5.562 3h1.39L5.23 6.08 3.394 4.12 5.562 3zM1.5 4.5a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5V5a.5.5 0 0 0-.5-.5h-13z" />
        </svg>
      </div>

      <h2 class="text-4xl font-bold mb-4 text-white tracking-tight">Citizen Entrance</h2>
      <p class="text-slate-400 text-lg leading-relaxed mb-10">Welcome to the digital registration system. Please connect
        your official MetaMask wallet to access your land records and management tools.</p>

      <button class="btn-primary w-full py-4.5 text-lg shadow-lg shadow-primary/25 transform hover:scale-[1.02]"
        onclick="connectToBlockchain()">
        Connect Secure Wallet
      </button>

      <div class="mt-8 flex items-center gap-2 text-slate-500 text-sm">
        <svg xmlns=http://www.w3.org/2000/svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
        Blockchain Secured Authentication
      </div>
    </div>
  </div>
</div>
{% endblock %}
