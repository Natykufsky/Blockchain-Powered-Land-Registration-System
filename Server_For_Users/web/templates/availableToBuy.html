{% extends 'base.html' %}

{% block title %}
Available To Buy
{% endblock %}

{% block content %}

<script src="js/availableToBuy.js"></script>
<script type="text/javascript">
    checkConnection()
</script>

<div class="min-h-[78vh]">
    <div id="formForTakingLocationId" class="max-w-xl mx-auto mb-12">
        <div class="glass p-8 rounded-3xl shadow-xl border border-white/10 text-center">
            <h2 class="text-2xl font-bold mb-6 text-white flex items-center justify-center gap-4">
                Find Properties for Sale
                <button onclick="refreshAvailableSales()"
                    class="p-2 bg-white/5 hover:bg-white/10 rounded-lg transition-all text-secondary hover:text-white"
                    title="Refresh Sales">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </h2>
            <form id="inputLocationIdForm" class="flex gap-4" method="post"
                onsubmit="fetchPropertiesAvailabletoBuy(event)">
                <input type="text" id="inputLocationId" placeholder="Enter Location ID" required
                    class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all">
                <button type="submit" class="btn-primary whitespace-nowrap">
                    Search Sales
                </button>
            </form>
        </div>
    </div>

    <div id="salesTable" class="hidden">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-white">Properties in Location: <span id="locationId"
                    class="text-primary"></span></h2>
        </div>

        <div class="glass rounded-2xl overflow-hidden shadow-2xl border border-white/10">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5 border-b border-white/10">
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">S.No
                            </th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Sale Id
                            </th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Owner
                            </th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Property
                                Id</th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Price
                                (ETH)</th>
                            <th class="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-secondary">Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody id="salesTableBody" class="divide-y divide-white/5">
                        <!-- Content populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal/Prompt UI (Hidden by default) -->
    <div id="prompt-container-backcover"
        class="fixed inset-0 z-[10002] bg-dark-900/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div id="prompt-container"
            class="glass rounded-3xl p-10 max-w-md w-full shadow-2xl border border-white/20 text-center">
            <label for="prompt-input" class="block text-xl font-bold mb-4 text-white">Enter Offer Price [Ether]</label>
            <input type="number" id="prompt-input" step="0.001"
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-center focus:outline-none focus:ring-2 focus:ring-primary mb-6">
            <div class="flex gap-4">
                <button id="prompt-cancel"
                    class="flex-1 px-6 py-3 rounded-xl font-semibold bg-white/10 hover:bg-white/20 transition-all">Cancel</button>
                <button id="prompt-ok" class="flex-1 btn-primary py-3">Confirm Buy</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}
